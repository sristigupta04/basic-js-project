<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="title.css"/>
</head>
<body>
    <h2>Task Manager</h2>
    <div class="contain">
        <input type="text" id="new" placeholder="What needs to be done?" autocomplete="off" aria-label="Add a new task">
        <button id="addTaskButton" type="button">Add Task</button>

        <div class="row" id="taskList" aria-live="polite">
        </div>
    </div>
    <script src="title.js" defer></script>
</body>
</html>
