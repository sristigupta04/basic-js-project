<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="work.css"/>
</head>
<body>
    <main class="container" aria-label="Calculator">
        <input type="text" id="result" placeholder="0" aria-label="Calculator display" readonly>
        <br><br>
        <div class="btn">
            <button type="button" data-value="1">1</button>
            <button type="button" data-value="2">2</button>
            <button type="button" data-value="3">3</button>
            <button type="button" data-value="4">4</button>
            <br><br>

            <button type="button" data-value="5">5</button>
            <button type="button" data-value="6">6</button>
            <button type="button" data-value="7">7</button>
            <button type="button" data-value="8">8</button>
            <br><br>

            <button type="button" data-value="0">0</button>
            <button type="button" data-value=".">.</button>
            <button type="button" data-action="clear">C</button>
            <button type="button" data-action="delete" aria-label="Delete last character">DEL</button>
            <br><br>

            <button type="button" data-value="+">+</button>
            <button type="button" data-value="-">-</button>
            <button type="button" data-value="*">*</button>
            <button type="button" data-value="/">/</button>
            <br><br>

            <button type="button" data-action="equals">=</button>
            <button type="button" data-action="all-clear">AC</button>
        </div>
    </main>
    <script src="work.js" defer></script>
</body>
</html>
