<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login Clone</title>
    <link rel="icon" type="icon" href="instagram logo.webp">
    <link rel="stylesheet" href="index.css">
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    >
</head>
<body>
    <main class="container" aria-label="Instagram login form">
        <div class="fill-up">
            <h1 class="ig">Instagram</h1>
            <input type="text" placeholder="Phone number, username, or email" aria-label="Username or email" autocomplete="username">
            <input type="password" placeholder="Password" aria-label="Password" autocomplete="current-password" required>
        </div>
        <button class="btn" type="button">Log in</button>
        <div class="or"><span>OR</span></div>
        <a href="#" class="facebook">
            <i class="fa-brands fa-facebook"></i> Log in with Facebook
        </a>

        <div class="foot">Forgot password?</div>

        <div class="foote">Don't have an account? <a href="#">Sign up</a></div>
    </main>
    <footer>
        <div class="boat">
            <a href="#">Meta</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
            <a href="#">Jobs</a>
            <a href="#">Help</a>
            <a href="#">Api</a>
            <a href="#">Privacy</a>
            <a href="#">Locations</a>
            <a href="#">Threads</a>
            <a href="#">Terms</a>
            <a href="#">Contact</a>
        </div>
        <div class="bt1">
            <select>
                <option>English</option>
                <option>Hindi</option>
                <option>Arabic</option>
                <option>Francais</option>
            </select>
            <span>&copy; 2025 Instagram from Meta</span>
        </div>
    </footer>
</body>
</html>
